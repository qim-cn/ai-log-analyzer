services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8880:80"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB}
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS}
      - RATE_LIMITER_BACKEND=${RATE_LIMITER_BACKEND}
      - MASK_SENSITIVE_DATA=${MASK_SENSITIVE_DATA}
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_STORAGE_PATH=${LOG_STORAGE_PATH}
      - JWT_SECRET=${JWT_SECRET}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - OBSIDIAN_WEBDAV_URL=${OBSIDIAN_WEBDAV_URL}
      - OBSIDIAN_WEBDAV_USER=${OBSIDIAN_WEBDAV_USER}
      - OBSIDIAN_WEBDAV_PASS=${OBSIDIAN_WEBDAV_PASS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES}
      - COOKIE_SECURE=${COOKIE_SECURE}
      - NO_PROXY=192.168.31.5,localhost,127.0.0.1
      - no_proxy=192.168.31.5,localhost,127.0.0.1
    volumes:
      - app-data:/data
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app-data:

networks:
  app-network:
    driver: bridge
