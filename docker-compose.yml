services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8880:80"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/app.db
      - LOG_STORAGE_PATH=/data/logs
      - MAX_FILE_SIZE_MB=50
      - OBSIDIAN_LOCAL_PATH=/vault
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - app-data:/data
      - /mnt/obsidian/奇梦网络工坊:/vault:rw
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app-data:

networks:
  app-network:
    driver: bridge
